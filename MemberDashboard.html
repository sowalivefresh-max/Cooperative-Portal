<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Portal — Cooperative Society</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <?!= include('Styles') ?>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="mainSidebar">
  <a class="sidebar-brand" href="#">
    <div class="sidebar-brand-icon">🏦</div>
    <div class="sidebar-brand-text">
      <div class="sidebar-brand-name" id="sidebarSocietyName">My Cooperative</div>
      <div class="sidebar-brand-tagline">Member Portal</div>
    </div>
  </a>
  <nav class="sidebar-nav">
    <div class="nav-section-label">My Account</div>
    <button class="nav-link active" data-page="home" onclick="showPage('home')"><span class="nav-icon">🏠</span> Dashboard</button>
    <button class="nav-link" data-page="profile" onclick="showPage('profile')"><span class="nav-icon">👤</span> My Profile</button>
    <button class="nav-link" data-page="notifications" onclick="showPage('notifications')">
      <span class="nav-icon">🔔</span> Notifications
      <span class="nav-badge" id="notifBadge" style="display:none">0</span>
    </button>
    <div class="nav-section-label">Finance</div>
    <button class="nav-link" data-page="contributions" onclick="showPage('contributions')"><span class="nav-icon">💵</span> My Contributions</button>
    <button class="nav-link" data-page="savings" onclick="showPage('savings')"><span class="nav-icon">🏦</span> My Savings</button>
    <button class="nav-link" data-page="loans" onclick="showPage('loans')"><span class="nav-icon">📋</span> My Loans</button>
    <div class="nav-section-label">Resources</div>
    <button class="nav-link" data-page="announcements" onclick="showPage('announcements')"><span class="nav-icon">📢</span> Announcements</button>
    <button class="nav-link" data-page="statement" onclick="showPage('statement')"><span class="nav-icon">📊</span> Account Statement</button>
  </nav>
  <div class="sidebar-footer">
    <button class="nav-link" onclick="COOP.logout()" style="color:#ef9a9a"><span class="nav-icon">🚪</span> Logout</button>
  </div>
</aside>

<div class="main-wrapper">
  <header class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle">☰</button>
    <div class="topbar-page-title" id="topbarTitle">My Dashboard</div>
    <div class="topbar-actions">
      <button class="topbar-btn" id="darkModeToggle" onclick="COOP.darkMode.toggle()">🌙</button>
      <button class="topbar-btn" onclick="showPage('notifications')">🔔<span class="notif-badge" id="notifBadge2" style="display:none">0</span></button>
      <div class="user-avatar" id="userAvatar" title="Profile">
        <span id="userInitials">M</span>
      </div>
    </div>
  </header>

  <main class="page-content" id="mainContent">

    <!-- HOME PAGE -->
    <section id="page-home">
      <!-- Welcome Banner -->
      <div style="background:linear-gradient(135deg,#1B5E20,#2E7D32,#1565C0);border-radius:var(--radius-xl);padding:28px 32px;margin-bottom:24px;color:#fff;position:relative;overflow:hidden">
        <div style="position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:rgba(255,255,255,.06);border-radius:50%"></div>
        <div style="position:absolute;bottom:-60px;right:60px;width:150px;height:150px;background:rgba(255,255,255,.04);border-radius:50%"></div>
        <div style="position:relative">
          <h1 style="font-size:22px;font-weight:800;margin-bottom:6px" id="memberGreeting">Hello, Member!</h1>
          <p style="font-size:13px;opacity:.8" id="memberSubtitle">Member No: — · Status: —</p>
        </div>
      </div>

      <!-- Quick Stats -->
      <div class="stats-grid" style="margin-bottom:24px">
        <div class="stat-card stat-teal">
          <div class="stat-icon icon-teal">🏦</div>
          <div class="stat-body">
            <div class="stat-label">Savings Balance</div>
            <div class="stat-value" id="mStatSavings">—</div>
          </div>
        </div>
        <div class="stat-card stat-gold">
          <div class="stat-icon icon-gold">💵</div>
          <div class="stat-body">
            <div class="stat-label">Total Contributions</div>
            <div class="stat-value" id="mStatContrib">—</div>
          </div>
        </div>
        <div class="stat-card stat-blue">
          <div class="stat-icon icon-blue">📋</div>
          <div class="stat-body">
            <div class="stat-label">Active Loan</div>
            <div class="stat-value" id="mStatLoan">—</div>
            <div class="stat-sub" id="mStatLoanSub"></div>
          </div>
        </div>
        <div class="stat-card stat-orange">
          <div class="stat-icon icon-orange">⏰</div>
          <div class="stat-body">
            <div class="stat-label">Next Repayment</div>
            <div class="stat-value" id="mStatNextDue">—</div>
            <div class="stat-sub" id="mStatNextAmt"></div>
          </div>
        </div>
      </div>

      <!-- Announcement + Recent Transactions -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div class="card">
          <div class="card-header">
            <span class="card-title">📢 Announcements</span>
          </div>
          <div class="card-body" id="memberAnnouncements">
            <div class="empty-state"><div class="page-loader-ring"></div></div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">📒 Recent Transactions</span>
            <button class="btn-outline-coop" style="font-size:12px;padding:5px 10px" onclick="showPage('statement')">View All</button>
          </div>
          <div class="card-body" style="padding:0">
            <table class="coop-table" id="recentTxnTable">
              <thead><tr><th>Date</th><th>Description</th><th>Type</th><th>Amount</th></tr></thead>
              <tbody id="recentTxnBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <section id="page-profile"      style="display:none"></section>
    <section id="page-contributions" style="display:none"></section>
    <section id="page-savings"       style="display:none"></section>
    <section id="page-loans"         style="display:none"></section>
    <section id="page-announcements" style="display:none"></section>
    <section id="page-notifications" style="display:none"></section>
    <section id="page-statement"     style="display:none"></section>
  </main>
</div>

<?!= include('Scripts') ?>
<script>
  var _user = null;
  var _memberId = null;

  document.addEventListener('DOMContentLoaded', function() {
    if (!COOP.token) { window.location.href = '<?= ScriptApp.getService().getUrl() ?>'; return; }
    COOP.api('getCurrentUser', {}, function(err, user) {
      if (err || !user) { COOP.clearSession(); window.location.href = '<?= ScriptApp.getService().getUrl() ?>'; return; }
      _user = user;
      _memberId = user.memberId;
      document.getElementById('userInitials').textContent = COOP.fmt.initials(user.fullName || user.email);
      loadHomeDashboard();
      loadMemberAnnouncements();
      loadRecentTransactions();
    });

    COOP.api('getPublicSystemInfo', {}, function(err, data) {
      if (!err && data && data.societyName) {
        document.getElementById('sidebarSocietyName').textContent = data.societyName;
      }
    });
  });

  function loadHomeDashboard() {
    if (!_user) return;
    var hour = new Date().getHours();
    var greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('memberGreeting').textContent = greet + ', ' + (_user.fullName || 'Member') + '! 👋';
    document.getElementById('memberSubtitle').textContent = 'Member No: ' + (_user.memberId || '—') + ' · Status: Active';

    // Load savings
    COOP.api('getSavings', { memberId: _memberId }, function(err, data) {
      if (!err && data) document.getElementById('mStatSavings').textContent = COOP.fmt.currency(data.currentBalance);
    });

    // Load contributions total
    COOP.api('getContributions', { memberId: _memberId, pageSize: 1 }, function(err, data) {
      // Load member profile to get total contributions
      COOP.api('getMember', { memberId: _memberId }, function(e2, member) {
        if (!e2 && member && member.financialSummary) {
          document.getElementById('mStatContrib').textContent = COOP.fmt.currency(member.financialSummary.totalContributions);
        }
      });
    });

    // Load active loan
    COOP.api('getLoans', { memberId: _memberId, status: 'Disbursed', pageSize: 1 }, function(err, data) {
      if (!err && data && data.data && data.data.length > 0) {
        var loan = data.data[0];
        document.getElementById('mStatLoan').textContent = COOP.fmt.currency(loan.outstandingBalance);
        document.getElementById('mStatLoanSub').textContent = loan.loanNumber;
        if (loan.nextDueDate) {
          document.getElementById('mStatNextDue').textContent = COOP.fmt.date(loan.nextDueDate);
        }
      } else {
        document.getElementById('mStatLoan').textContent = 'None';
        document.getElementById('mStatNextDue').textContent = 'None';
      }
    });
  }

  function loadMemberAnnouncements() {
    COOP.api('getAnnouncements', {}, function(err, data) {
      var container = document.getElementById('memberAnnouncements');
      if (!container) return;
      if (err || !data || data.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📢</div><div>No announcements</div></div>';
        return;
      }
      container.innerHTML = data.slice(0, 3).map(function(a) {
        var cls = (a.priority || 'Normal').toLowerCase();
        return '<div class="announcement-card ' + cls + '" style="margin-bottom:10px">' +
          '<div><div style="font-weight:700;font-size:13px">' + COOP.escHtml(a.title) + '</div>' +
          '<div style="font-size:12px;margin-top:4px">' + COOP.escHtml(a.body.substring(0, 100)) + (a.body.length > 100 ? '…' : '') + '</div>' +
          '<div style="font-size:11px;color:var(--text-muted);margin-top:6px">' + COOP.fmt.date(a.publishedAt) + '</div></div></div>';
      }).join('');
    });
  }

  function loadRecentTransactions() {
    if (!_memberId) return;
    COOP.api('getTransactions', { memberId: _memberId, pageSize: 6 }, function(err, data) {
      var tbody = document.getElementById('recentTxnBody');
      if (!tbody) return;
      if (err || !data || data.total === 0) {
        tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state" style="padding:20px"><div class="empty-state-icon" style="font-size:32px">📒</div><div>No transactions yet</div></div></td></tr>';
        return;
      }
      tbody.innerHTML = data.data.map(function(t) {
        var isCredit = t.type === 'Credit';
        return '<tr><td style="font-size:12px">' + COOP.fmt.date(t.date) + '</td>' +
          '<td style="font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + COOP.escHtml((t.description || t.category || '').substring(0, 30)) + '</td>' +
          '<td><span style="color:' + (isCredit ? 'var(--primary)' : 'var(--danger)') + ';font-weight:600;font-size:11px">' + (isCredit ? '▲ In' : '▼ Out') + '</span></td>' +
          '<td style="color:' + (isCredit ? 'var(--primary)' : 'var(--danger)') + ';font-weight:700;font-size:13px">' + COOP.fmt.currency(t.amount) + '</td></tr>';
      }).join('');
    });
  }

  var PAGE_TITLES = { home:'My Dashboard', profile:'My Profile', contributions:'My Contributions',
    savings:'My Savings', loans:'My Loans', announcements:'Announcements',
    notifications:'Notifications', statement:'Account Statement' };

  function showPage(page) {
    document.querySelectorAll('main > section').forEach(function(s) { s.style.display = 'none'; });
    var el = document.getElementById('page-' + page);
    if (el) el.style.display = 'block';
    COOP.sidebar.setActive(page);
    document.getElementById('topbarTitle').textContent = PAGE_TITLES[page] || page;
    if (page !== 'home') renderMemberPage(page, el);
  }

  function renderMemberPage(page, el) {
    if (!el || el.hasAttribute('data-loaded')) return;
    el.setAttribute('data-loaded', '1');
    switch (page) {
      case 'contributions': renderMemberContributions(el); break;
      case 'savings':       renderMemberSavings(el);       break;
      case 'loans':         renderMemberLoans(el);          break;
      case 'announcements': renderMemberAnnouncementsPage(el); break;
      case 'notifications': renderNotificationsPage(el);   break;
      case 'statement':     renderAccountStatement(el);     break;
      case 'profile':       renderProfilePage(el);          break;
    }
  }

  function renderMemberContributions(el) {
    el.innerHTML = '<div class="page-header"><div><h1 class="page-title">My Contributions</h1></div><button class="btn-outline-coop" onclick="exportMyContrib()">📥 Export</button></div>' +
      '<div class="table-card"><div class="table-responsive"><table class="coop-table"><thead><tr><th>Receipt No</th><th>Type</th><th>Period</th><th>Amount</th><th>Method</th><th>Date</th></tr></thead><tbody id="myContribTbody"></tbody></table></div>' +
      '<div class="card-footer"><div id="myContribPag"></div></div></div>';
    loadMyContrib(1);
  }
  function loadMyContrib(page) {
    COOP.api('getContributions', { memberId: _memberId, page: page, pageSize: 15 }, function(err, data) {
      var tbody = document.getElementById('myContribTbody');
      if (!tbody) return;
      if (err || !data || data.total === 0) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon">💵</div><div>No contributions found</div></div></td></tr>'; return; }
      tbody.innerHTML = data.data.map(function(c) {
        return '<tr><td><code>' + c.receiptNumber + '</code></td><td>' + c.type + '</td><td>' + COOP.fmt.monthLabel(c.month) + '</td>' +
          '<td><strong style="color:var(--primary)">' + COOP.fmt.currency(c.amount) + '</strong></td><td>' + c.paymentMethod + '</td><td>' + COOP.fmt.date(c.paymentDate) + '</td></tr>';
      }).join('');
      COOP.pagination.render('myContribPag', data.page, data.pages, loadMyContrib);
    });
  }
  function exportMyContrib() {
    COOP.api('getContributionReport', { memberId: _memberId, format: 'csv' }, function(err, data) {
      if (err) { COOP.toast.error(err); return; }
      COOP.downloadCsv(data.csv, 'My_Contributions.csv');
      COOP.toast.success('Exported!');
    });
  }

  function renderMemberSavings(el) {
    el.innerHTML = '<div class="page-header"><div><h1 class="page-title">My Savings</h1></div></div>' +
      '<div id="mySavingsInfo"><div class="empty-state"><div class="page-loader-ring"></div></div></div>';
    COOP.api('getSavingsStatement', { memberId: _memberId }, function(err, data) {
      var container = document.getElementById('mySavingsInfo');
      if (!container) return;
      var sav = (data && data.savings) || {};
      container.innerHTML =
        '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px">' +
        '<div class="stat-card stat-teal"><div class="stat-icon icon-teal">💰</div><div class="stat-body"><div class="stat-label">Current Balance</div><div class="stat-value">' + COOP.fmt.currency(sav.currentBalance) + '</div></div></div>' +
        '<div class="stat-card stat-green"><div class="stat-icon icon-green">📈</div><div class="stat-body"><div class="stat-label">Interest Accrued</div><div class="stat-value">' + COOP.fmt.currency(sav.interestAccrued) + '</div></div></div>' +
        '</div>' +
        '<div class="card"><div class="card-header"><span class="card-title">Transaction History</span></div><div class="table-responsive"><table class="coop-table"><thead><tr><th>Date</th><th>Category</th><th>Type</th><th>Amount</th><th>Balance</th></tr></thead><tbody>' +
        ((data && data.transactions) || []).map(function(t) {
          var isCredit = t.type === 'Credit';
          return '<tr><td>' + COOP.fmt.date(t.date) + '</td><td>' + COOP.escHtml(t.category || '') + '</td>' +
            '<td style="color:' + (isCredit ? 'var(--primary)' : 'var(--danger)') + ';font-weight:600">' + (isCredit ? '▲ Credit' : '▼ Debit') + '</td>' +
            '<td style="color:' + (isCredit ? 'var(--primary)' : 'var(--danger)') + ';font-weight:700">' + COOP.fmt.currency(t.amount) + '</td>' +
            '<td>' + COOP.fmt.currency(t.balance) + '</td></tr>';
        }).join('') + '</tbody></table></div></div>';
    });
  }

  function renderMemberLoans(el) {
    el.innerHTML = '<div class="page-header"><div><h1 class="page-title">My Loans</h1></div><button class="btn-primary-coop" onclick="applyForLoan()">➕ Apply for Loan</button></div>' +
      '<div id="myLoansContent"><div class="empty-state"><div class="page-loader-ring"></div></div></div>';
    COOP.api('getLoans', { memberId: _memberId, pageSize: 20 }, function(err, data) {
      var container = document.getElementById('myLoansContent');
      if (!container) return;
      if (err || !data || data.total === 0) { container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-title">No loans yet</div><div class="empty-state-desc">Apply for a loan to get started</div></div>'; return; }
      container.innerHTML = data.data.map(function(l) {
        var progress = l.approvedAmount > 0 ? Math.min(100, (l.totalRepaid / l.approvedAmount) * 100) : 0;
        return '<div class="card" style="margin-bottom:12px"><div class="card-body">' +
          '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px">' +
          '<div><div style="font-weight:800;font-size:15px">' + l.productType + ' Loan</div>' +
          '<div style="font-size:12px;color:var(--text-muted)">' + l.loanNumber + ' · ' + COOP.fmt.date(l.createdAt) + '</div></div>' +
          COOP.fmt.statusBadge(l.status) + '</div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">' +
          '<div><div style="font-size:11px;color:var(--text-muted)">Loan Amount</div><div style="font-weight:800">' + COOP.fmt.currency(l.approvedAmount || l.requestedAmount) + '</div></div>' +
          '<div><div style="font-size:11px;color:var(--text-muted)">Repaid</div><div style="font-weight:800;color:var(--primary)">' + COOP.fmt.currency(l.totalRepaid) + '</div></div>' +
          '<div><div style="font-size:11px;color:var(--text-muted)">Outstanding</div><div style="font-weight:800;color:var(--danger)">' + COOP.fmt.currency(l.outstandingBalance) + '</div></div>' +
          '</div>' +
          '<div><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Repayment Progress</div>' +
          '<div class="progress-coop"><div class="progress-fill" style="width:' + progress.toFixed(0) + '%"></div></div>' +
          '<div style="font-size:11px;color:var(--text-muted);margin-top:3px;text-align:right">' + progress.toFixed(0) + '% repaid</div></div>' +
          (l.nextDueDate ? '<div style="margin-top:10px;padding:8px 12px;background:var(--warning-pale);border-radius:var(--radius-sm);font-size:12px;color:var(--warning)">⏰ Next due: <strong>' + COOP.fmt.date(l.nextDueDate) + '</strong></div>' : '') +
          '</div></div>';
      }).join('');
    });
  }

  function applyForLoan() {
    COOP.toast.info('Please contact the office to apply for a loan, or log in to the admin portal.');
  }

  function renderMemberAnnouncementsPage(el) {
    el.innerHTML = '<div class="page-header"><div><h1 class="page-title">Announcements</h1></div></div><div id="annFullList"></div>';
    COOP.api('getAnnouncements', {}, function(err, data) {
      var container = document.getElementById('annFullList');
      if (!container) return;
      if (err || !data || data.length === 0) { container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📢</div><div>No announcements</div></div>'; return; }
      container.innerHTML = data.map(function(a) {
        var cls = (a.priority || 'Normal').toLowerCase();
        return '<div class="card" style="margin-bottom:12px"><div class="card-body">' +
          '<div style="display:flex;align-items:flex-start;gap:12px">' +
          '<div style="font-size:28px">' + (cls === 'urgent' ? '🔴' : cls === 'high' ? '🟠' : '📢') + '</div>' +
          '<div><div style="font-weight:700;font-size:15px;margin-bottom:6px">' + COOP.escHtml(a.title) + '</div>' +
          '<div style="color:var(--text-secondary);font-size:13px;line-height:1.7">' + COOP.escHtml(a.body) + '</div>' +
          '<div style="margin-top:10px;font-size:12px;color:var(--text-muted)">' + COOP.fmt.datetime(a.publishedAt) + '</div></div></div>' +
          '</div></div>';
      }).join('');
    });
  }

  function renderNotificationsPage(el) {
    el.innerHTML = '<div class="page-header"><div><h1 class="page-title">Notifications</h1></div>' +
      '<button class="btn-outline-coop" onclick="markAllRead()">✓ Mark All Read</button></div>' +
      '<div id="notifList"><div class="empty-state"><div class="page-loader-ring"></div></div></div>';
    loadNotifications();
  }
  function loadNotifications() {
    COOP.api('getNotifications', {}, function(err, data) {
      var container = document.getElementById('notifList');
      if (!container) return;
      if (err || !data || data.total === 0) { container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔔</div><div>No notifications</div></div>'; return; }
      container.innerHTML = data.data.map(function(n) {
        return '<div class="card" style="margin-bottom:8px' + (!n.isRead ? ';border-left:3px solid var(--primary)' : '') + '">' +
          '<div class="card-body" style="display:flex;gap:14px;align-items:flex-start">' +
          '<div style="font-size:22px">' + (n.type === 'LoanAlert' ? '📋' : n.type === 'Announcement' ? '📢' : '🔔') + '</div>' +
          '<div style="flex:1"><div style="font-weight:' + (n.isRead ? '500' : '700') + ';font-size:14px">' + COOP.escHtml(n.title) + '</div>' +
          '<div style="font-size:13px;color:var(--text-secondary);margin-top:3px">' + COOP.escHtml(n.message) + '</div>' +
          '<div style="font-size:11px;color:var(--text-muted);margin-top:6px">' + COOP.fmt.datetime(n.sentAt) + '</div></div>' +
          (!n.isRead ? '<span style="width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:6px"></span>' : '') +
          '</div></div>';
      }).join('');
    });
  }
  function markAllRead() {
    COOP.api('markNotificationsRead', { notificationIds: 'ALL' }, function(err) {
      if (err) { COOP.toast.error(err); return; }
      COOP.toast.success('All notifications marked as read.');
      COOP.refreshNotifBadge();
      loadNotifications();
    });
  }

  function renderAccountStatement(el) {
    el.innerHTML = '<div class="page-header"><div><h1 class="page-title">Account Statement</h1></div><button class="btn-outline-coop" onclick="downloadStatement()">📥 Download</button></div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">' +
      '<div><label class="form-label">From</label><input type="date" id="stmtFrom" class="form-control"></div>' +
      '<div><label class="form-label">To</label><input type="date" id="stmtTo" class="form-control"></div></div>' +
      '<button class="btn-primary-coop" onclick="loadStatement()" style="margin-bottom:20px">🔍 Generate Statement</button>' +
      '<div id="stmtResult"></div>';
  }
  function loadStatement() {
    var from = document.getElementById('stmtFrom').value;
    var to   = document.getElementById('stmtTo').value;
    COOP.loader.show('Generating statement…');
    COOP.api('getSavingsStatement', { memberId: _memberId, dateFrom: from, dateTo: to }, function(err, data) {
      COOP.loader.hide();
      var container = document.getElementById('stmtResult');
      if (!container) return;
      if (err) { container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">❌</div><div>' + err + '</div></div>'; return; }
      var txns = (data && data.transactions) || [];
      if (txns.length === 0) { container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><div>No transactions in the selected period</div></div>'; return; }
      var totalCredits = txns.filter(function(t) { return t.type === 'Credit'; }).reduce(function(s,t) { return s + t.amount; }, 0);
      var totalDebits  = txns.filter(function(t) { return t.type === 'Debit';  }).reduce(function(s,t) { return s + t.amount; }, 0);
      container.innerHTML =
        '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">' +
        '<div class="stat-card stat-green"><div class="stat-icon icon-green">▲</div><div class="stat-body"><div class="stat-label">Total Credits</div><div class="stat-value">' + COOP.fmt.currency(totalCredits) + '</div></div></div>' +
        '<div class="stat-card stat-red"><div class="stat-icon icon-red">▼</div><div class="stat-body"><div class="stat-label">Total Debits</div><div class="stat-value">' + COOP.fmt.currency(totalDebits) + '</div></div></div>' +
        '<div class="stat-card stat-blue"><div class="stat-icon icon-blue">⚖</div><div class="stat-body"><div class="stat-label">Net</div><div class="stat-value">' + COOP.fmt.currency(totalCredits - totalDebits) + '</div></div></div>' +
        '</div>' +
        '<div class="table-card"><div class="table-responsive"><table class="coop-table"><thead><tr><th>Date</th><th>Description</th><th>Type</th><th>Amount</th><th>Balance</th></tr></thead><tbody>' +
        txns.map(function(t) {
          var isC = t.type === 'Credit';
          return '<tr><td>' + COOP.fmt.date(t.date) + '</td><td>' + COOP.escHtml((t.description || t.category || '').substring(0, 40)) + '</td>' +
            '<td style="color:' + (isC ? 'var(--primary)' : 'var(--danger)') + ';font-weight:600">' + (isC ? '▲ Credit' : '▼ Debit') + '</td>' +
            '<td style="font-weight:700;color:' + (isC ? 'var(--primary)' : 'var(--danger)') + '">' + COOP.fmt.currency(t.amount) + '</td>' +
            '<td>' + COOP.fmt.currency(t.balance) + '</td></tr>';
        }).join('') +
        '</tbody></table></div></div>';
    });
  }
  function downloadStatement() { COOP.toast.info('Generating PDF statement…'); }

  function renderProfilePage(el) {
    el.innerHTML = '<div class="page-header"><div><h1 class="page-title">My Profile</h1></div></div>' +
      '<div id="profileContent"><div class="empty-state"><div class="page-loader-ring"></div></div></div>';
    COOP.api('getMember', { memberId: _memberId }, function(err, member) {
      var container = document.getElementById('profileContent');
      if (!container) return;
      if (err || !member) { container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">❌</div><div>Failed to load profile</div></div>'; return; }
      var m = member;
      container.innerHTML =
        '<div style="display:grid;grid-template-columns:280px 1fr;gap:20px">' +
        '<div class="card"><div class="card-body" style="text-align:center">' +
        (m.passportPhotoUrl ? '<img src="' + m.passportPhotoUrl + '" style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid var(--primary);margin-bottom:16px">' :
        '<div class="member-avatar" style="width:120px;height:120px;font-size:40px;margin:0 auto 16px">' + COOP.fmt.initials(m.fullName) + '</div>') +
        '<div style="font-weight:800;font-size:18px">' + COOP.escHtml(m.fullName) + '</div>' +
        '<div style="font-size:13px;color:var(--text-muted);margin-top:4px">' + COOP.escHtml(m.memberNumber) + '</div>' +
        '<div style="margin-top:8px">' + COOP.fmt.statusBadge(m.status) + '</div>' +
        '<hr class="section-divider">' +
        '<div style="text-align:left;font-size:13px">' +
        ['📱 ' + (m.phone || '—'), '✉️ ' + (m.email || '—'), '📅 Joined: ' + COOP.fmt.date(m.dateJoined)].map(function(line) {
          return '<div style="margin-bottom:8px;color:var(--text-secondary)">' + COOP.escHtml(line) + '</div>';
        }).join('') + '</div></div></div>' +
        '<div class="card"><div class="card-header"><span class="card-title">Personal Information</span></div><div class="card-body">' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">' +
        [
          { label: 'Full Name',    val: m.fullName },
          { label: 'Gender',       val: m.gender },
          { label: 'Date of Birth',val: COOP.fmt.date(m.dateOfBirth) },
          { label: 'State of Origin', val: m.stateOfOrigin },
          { label: 'Address',      val: m.residentialAddress },
          { label: 'Occupation',   val: m.occupation },
          { label: 'Employer',     val: m.employer },
          { label: 'Next of Kin',  val: m.nextOfKin ? (m.nextOfKin.name + ' (' + m.nextOfKin.relationship + ')') : '—' }
        ].map(function(f) {
          return '<div><div class="form-label">' + f.label + '</div><div style="font-weight:600;font-size:14px">' + COOP.escHtml(f.val || '—') + '</div></div>';
        }).join('') +
        '</div></div></div></div>';
    });
  }
</script>
</body>
</html>
